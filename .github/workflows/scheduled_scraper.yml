name: 🚤 競艇当日データ自動スクレイピング

on:
  schedule:
      # 01:15 JST -> 16:15 UTC
      # 06:15 JST -> 21:15 UTC
      # 10:15 JST -> 01:15 UTC
      - cron: '15 16,21,1 * * *'
  workflow_dispatch:

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v3

    - name: Python環境をセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 必要なライブラリをインストール
      run: |
        pip install requests beautifulsoup4 pandas pytz

    - name: スクレイピングを実行（出走表の取得）
      run: python scraper.py

    - name: 選手マスタの部分更新（1日最大50名）
      continue-on-error: true   # 💡【重要】マスタ更新がエラーでコケても、このステップを無視して次へ進むという最強の保険です
      run: python update_racer_master.py

    - name: 変更があった場合のみGitHubに自動上書き保存（Commit & Push）
      if: always()              # 💡【重要】前段で何が起きても、絶対にこの保存作業だけは実行させる
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add real_time_出走表.csv
        git add racer_master.csv || true  # 新規作成前でもエラーにならないおまじない
        git diff --cached --quiet || (git commit -m "🤖 自動更新: 本日の出走表 ＆ 選手マスタをアップデート" && git pull --rebase origin main && git push)
