name: 🚤 競艇当日データ自動スクレイピング

on:
  schedule:
      # 01:15 JST -> 16:15 UTC
      # 06:15 JST -> 21:15 UTC
      # 10:15 JST -> 01:15 UTC
      - cron: '15 16,21,1 * * *'
  workflow_dispatch:

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v3

    - name: Python環境をセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 必要なライブラリをインストール
      run: |
        pip install requests beautifulsoup4 pandas pytz

    - name: スクレイピングを実行
      run: python scraper.py

    - name: 変更があった場合のみGitHubに自動上書き保存（Commit & Push）
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add real_time_出走表.csv
        git diff --cached --quiet || (git commit -m "🤖 自動更新: 本日の出走表データをアップデート" && git push)
